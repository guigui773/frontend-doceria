<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login da Administracao</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body class="login-page">
    <header class="site-header">
        <div class="container header-content">
            <div>
                <p class="eyebrow">Area administrativa</p>
                <h1>Login do administrador</h1>
            </div>
            <nav class="top-nav">
                <a class="nav-link" href="./index.html">Voltar ao cardapio</a>
            </nav>
        </div>
    </header>

    <main class="login-shell">
        <section class="login-card">
            <div class="login-card-content">
                <p class="eyebrow">Acesso restrito</p>
                <h1>Painel administrativo</h1>
                <p class="login-intro">Entre com o e-mail e a senha do administrador para gerenciar o cardapio.</p>
                <p class="login-intro">No Firebase, habilite o GitHub Auth e crie o usuario administrativo antes do primeiro acesso.</p>

                <p id="login-feedback" class="status-message hidden"></p>

                <form id="login-form" class="login-form">
                    <label class="form-field">
                        <span>E-mail</span>
                        <input id="username" name="username" type="email" required>
                    </label>

                    <label class="form-field">
                        <span>Senha</span>
                        <input id="password" name="password" type="password" required>
                    </label>

                    <button id="login-button" class="button button-primary login-button" type="submit">Entrar</button>
                </form>

                <div class="login-divider">
                    <span>ou</span>
                </div>

                <button id="github-login-button" class="button button-secondary github-login-button" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    Entrar com GitHub
                </button>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="./assets/firebase-config.js"></script>
    <script src="./assets/firebase-client.js"></script>
    <script src="./assets/config.js"></script>
    <script src="./assets/login.js"></script>
</body>
</html>
