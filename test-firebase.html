<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Firebase - Diagnóstico</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #4ec9b0; }
        .card {
            background: #252526;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            border-left: 4px solid #ccc;
        }
        .success { border-left-color: #4caf50; background: #1e3a1f; }
        .error { border-left-color: #f44336; background: #3a1f1f; }
        .warning { border-left-color: #ff9800; background: #3a2a1f; }
        .info { border-left-color: #2196F3; background: #1f2a3a; }
        .code {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 3px;
            margin: 10px 0;
            overflow-x: auto;
            border-left: 3px solid #4ec9b0;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px 10px 0;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #1976D2; }
        button:disabled { background: #555; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 10px; border-radius: 3px; }
        .red { color: #f44336; }
        .green { color: #4caf50; }
        .yellow { color: #ff9800; }
        .blue { color: #2196F3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Teste de Diagnóstico Firebase</h1>

        <div class="card info">
            <strong>ℹ️ Instruções:</strong>
            <p>Este teste vai verificar cada passo da configuração.</p>
            <p>Se algum resultado for <span class="red">❌ vermelho</span>, siga a instrução de correção.</p>
        </div>

        <div id="logs"></div>

        <div class="card">
            <strong>🧪 Teste Prático:</strong>
            <button onclick="testGitHubLogin()">Clique para Testar Login GitHub</button>
            <div id="login-result" class="status"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Configuração -->
    <script src="./assets/firebase-config.js"></script>
    <script src="./assets/firebase-client.js"></script>

    <script>
        var logs = [];

        function log(type, title, message, code) {
            var color = type === 'success' ? 'green' : type === 'error' ? 'red' : type === 'warning' ? 'yellow' : 'blue';
            var icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
            
            var entry = {
                type: type,
                title: title,
                message: message,
                code: code
            };
            logs.push(entry);

            var logsDiv = document.getElementById('logs');
            var card = document.createElement('div');
            card.className = 'card ' + type;
            
            var html = '<strong><span class="' + color + '">' + icon + ' ' + title + '</span></strong>';
            html += '<p>' + message + '</p>';
            if (code) {
                html += '<div class="code">' + escapeHtml(code) + '</div>';
            }
            card.innerHTML = html;
            logsDiv.appendChild(card);
        }

        function escapeHtml(text) {
            var map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // ===== VERIFICAÇÕES =====

        // 1. Firebase SDK
        if (window.firebase) {
            log('success', 'Firebase SDK', 'Firebase SDK carregado com sucesso', 'window.firebase: ' + (typeof window.firebase));
        } else {
            log('error', 'Firebase SDK', 'Firebase SDK NÃO foi carregado!', 'Verifique os scripts <script> no HTML');
        }

        // 2. Configuração Firebase
        var config = window.firebaseConfig || {};
        if (config.apiKey && config.apiKey !== 'YOUR_API_KEY') {
            log('success', 'Credenciais Firebase', 'Configuração detectada com valores', 
                'projectId: ' + config.projectId + '\n' +
                'authDomain: ' + config.authDomain);
        } else {
            log('error', 'Credenciais Firebase', 'Credenciais vazias ou não preenchidas!',
                'Edite assets/firebase-config.js e preencha com seus valores do Firebase Console');
        }

        // 3. Firebase Auth inicializado
        setTimeout(function() {
            if (window.cardapioFirebaseAuth) {
                log('success', 'Firebase Auth', 'Auth inicializado com sucesso');
            } else if (window.firebase && window.firebase.auth) {
                var auth = window.firebase.auth();
                if (auth) {
                    log('success', 'Firebase Auth', 'Auth disponível (inicializado manualmente)');
                    window.cardapioFirebaseAuth = auth;
                } else {
                    log('error', 'Firebase Auth', 'Falha ao inicializar Auth');
                }
            } else {
                log('error', 'Firebase Auth', 'Firebase Auth não foi carregado corretamente');
            }
        }, 500);

        // 4. GitHub Provider
        setTimeout(function() {
            try {
                if (window.firebase && window.firebase.auth && window.firebase.auth.GithubAuthProvider) {
                    var provider = new window.firebase.auth.GithubAuthProvider();
                    log('success', 'GitHub Provider', 'GithubAuthProvider disponível e funcionando');
                } else {
                    log('error', 'GitHub Provider', 
                        'GithubAuthProvider não está disponível',
                        'Verifique se firebase-auth foi carregado');
                }
            } catch (error) {
                log('error', 'GitHub Provider', 'Erro ao criar provider: ' + error.message, error.stack);
            }
        }, 1000);

        // 5. Teste de Login
        async function testGitHubLogin() {
            var resultEl = document.getElementById('login-result');
            resultEl.innerHTML = '<span class="blue">⏳ Aguardando autorização...</span>';

            try {
                if (!window.firebase) {
                    throw new Error('Firebase SDK não foi carregado');
                }

                if (!window.cardapioFirebaseAuth) {
                    window.cardapioFirebaseAuth = window.firebase.auth();
                }

                var auth = window.cardapioFirebaseAuth;
                var provider = new window.firebase.auth.GithubAuthProvider();
                provider.addScope('user:email');
                provider.setCustomParameters({ 'allow_signup': 'true' });

                var result = await auth.signInWithPopup(provider);
                
                log('success', 'GitHub Login', 'Login bem-sucedido!',
                    'Usuário: ' + result.user.displayName + '\nEmail: ' + result.user.email);
                
                resultEl.innerHTML = '<span class="green">✅ Login bem-sucedido! Bem-vindo ' + result.user.displayName + '</span>';

            } catch (error) {
                log('error', 'GitHub Login', 'Erro: ' + error.message, 'Código: ' + error.code);
                
                var msg = '❌ ' + error.message + ' (código: ' + error.code + ')';
                
                if (error.code === 'auth/unauthorized-domain') {
                    msg += '<br><br><strong>SOLUÇÃO:</strong> Você precisa autorizar este domínio no Firebase:<br>' +
                           '1. Firebase Console > Authentication > Settings<br>' +
                           '2. Authorized domains > Add domain<br>' +
                           '3. Cole: <code>' + escapeHtml(window.location.hostname) + '</code>';
                } else if (error.code === 'auth/popup-blocked') {
                    msg += '<br><br><strong>SOLUÇÃO:</strong> Pop-up foi bloqueado. Clique no ícone de bloqueador no navegador e permita pop-ups.';
                } else if (error.code === 'auth/operation-not-supported-in-this-environment') {
                    msg += '<br><br><strong>SOLUÇÃO:</strong> Pop-ups não são suportados. Tente em outro navegador.';
                }
                
                resultEl.innerHTML = msg;
            }
        }

        // Log inicial
        log('info', 'Diagnóstico Iniciado', 'Todos os testes foram executados. Verifique os resultados acima.');
    </script>
</body>
</html>
